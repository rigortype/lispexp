name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # The corpus submodules under tests/corpus/ are large and not needed for
      # the unit tests — the corpus tests self-skip when they are absent.
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Docs
        run: cargo doc --no-deps --workspace
        env:
          RUSTDOCFLAGS: -D warnings
      - name: Package (dry run)
        # Only the core crate publishes via the vX.Y.Z tag flow; the companion
        # crate (crates/lispexp-emacs-indent) versions and publishes separately.
        run: cargo publish --dry-run -p lispexp

  msrv:
    runs-on: ubuntu-latest
    steps:
      # The corpus submodules under tests/corpus/ are large and not needed for
      # the unit tests — the corpus tests self-skip when they are absent.
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.70
      - name: Check (MSRV)
        run: cargo check --workspace --all-targets
