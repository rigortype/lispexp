name: Release

# Publishes to crates.io and creates a GitHub Release when a `vX.Y.Z` tag is
# pushed. Requires the repository secret CARGO_REGISTRY_TOKEN (a crates.io API
# token). See .claude/skills/sexpp-release-prep/SKILL.md.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Check tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate="$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)".*/\1/')"
          echo "tag=$tag crate=$crate"
          if [ "$tag" != "$crate" ]; then
            echo "::error::tag v$tag does not match Cargo.toml version $crate"
            exit 1
          fi

      - name: Publish to crates.io
        run: cargo publish --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Extract this version's section from CHANGELOG.md as the release body.
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { p = 1; next }
            p && /^## \[/ { exit }
            p { print }
          ' CHANGELOG.md > release-body.md
          if [ ! -s release-body.md ]; then
            echo "Release ${GITHUB_REF_NAME}." > release-body.md
          fi
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-body.md
